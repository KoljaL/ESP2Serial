[env:ifan04_serial]
platform = espressif8266
board = esp8285
framework = arduino
monitor_speed = 9600
; Generated by Copilot
upload_speed = 115200
extra_scripts = pre:extra_scripts/load_env.py
build_flags =
  -D SERIAL_BAUD=9600
  -D REMOTE_SIGNAL_BAUD=9600
  -D REMOTE_SIGNAL_RX_PIN=3

[env:ifan04_ota]
extends = env:ifan04_serial
upload_protocol = espota
